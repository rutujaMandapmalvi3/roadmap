name: "pr Workflow"                                                                                                          

on:                                                                                                                            
  push:                                                   
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
        contents: read
        packages: write

    steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-node@v3
          with:
            node-version: '18'

        - name: Install dependencies
          run: npm ci

        - name: Lint check
          run: npm run lint